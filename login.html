<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Iniciar Sesión | Rincón Creativo AM</title>
    <link rel="shortcut icon" type="image/jpeg" href="Ex-proyecto/logo_rcam.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #E8F6F7 0%, #fff5f6 55%, #FDE8EB 100%);
            padding: 20px;
        }
        /* ── Card de login ──────────────────────────────── */
        
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(42, 171, 179, 0.15);
            padding: 44px 40px 36px;
            width: 100%;
            max-width: 420px;
            animation: fadeUp 0.5s ease both;
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* ── Logo ──────────────────────────────────────── */
        
        .login-logo {
            display: block;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #2AABB3;
            margin: 0 auto 20px;
            box-shadow: 0 4px 16px rgba(42, 171, 179, 0.25);
        }
        
        .login-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 4px;
        }
        
        .login-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 28px;
        }
        /* ── Campos ─────────────────────────────────────── */
        
        .field-group {
            margin-bottom: 18px;
        }
        
        .field-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        
        .field-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #dde;
            border-radius: 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .field-group input:focus {
            border-color: #2AABB3;
            box-shadow: 0 0 0 3px rgba(42, 171, 179, 0.12);
        }
        /* ── Botón ──────────────────────────────────────── */
        
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #2AABB3;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-top: 6px;
        }
        
        .btn-login:hover:not(:disabled) {
            background: #228E95;
            transform: translateY(-1px);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        /* ── Error / Feedback ───────────────────────────── */
        
        .login-error {
            display: none;
            background: #FDE8EB;
            color: #c0392b;
            border: 1px solid #F08B96;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 0.88rem;
            font-weight: 600;
            margin-top: 14px;
            text-align: center;
        }
        /* ── Link volver ────────────────────────────────── */
        
        .login-back {
            display: block;
            text-align: center;
            margin-top: 22px;
            font-size: 0.83rem;
            color: #888;
            text-decoration: none;
        }
        
        .login-back:hover {
            color: #2AABB3;
        }
        /* ── Responsive ─────────────────────────────────── */
        
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 22px 28px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">

        <img src="Ex-proyecto/logo_rcam.jpg" alt="Rincón Creativo AM" class="login-logo">
        <h1 class="login-title">Panel Administrativo</h1>
        <p class="login-subtitle">Rincón Creativo AM</p>

        <form id="login-form" novalidate>

            <div class="field-group">
                <label for="email">Usuario o Correo</label>
                <input id="email" type="text" placeholder="username" autocomplete="username" required>
            </div>

            <div class="field-group">
                <label for="password">Contraseña</label>
                <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" minlength="6" required>
            </div>

            <button type="submit" class="btn-login" id="btn-login">
        Iniciar sesión
      </button>

            <div class="login-error" id="login-error"></div>

        </form>

        <a href="/" class="login-back">← Volver al sitio</a>

    </div>

    <script>
        // Si ya está autenticado, redirigir directo al admin
        (function() {
            const token = sessionStorage.getItem('rcam_token');
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.exp * 1000 > Date.now()) {
                        window.location.href = '/admin/admin.html';
                    }
                } catch {}
            }
        })();

        document.getElementById('login-form').addEventListener('submit', async(e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('login-error');

            // Validaciones básicas
            if (!email || !password) {
                errEl.textContent = 'Completa todos los campos.';
                errEl.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Verificando...';
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password
                    })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Credenciales incorrectas');

                sessionStorage.setItem('rcam_token', data.token);
                window.location.href = '/admin/admin.html';

            } catch (err) {
                errEl.textContent = err.message || 'Credenciales incorrectas';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Iniciar sesión';
            }
        });
    </script>

</body>

</html>
